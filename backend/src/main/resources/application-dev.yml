spring:
  application:
    name: skillscope-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skillscope}
    username: ${SPRING_DATASOURCE_USERNAME:skillscope}
    password: ${SPRING_DATASOURCE_PASSWORD:skillscope}
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
