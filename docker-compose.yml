services:
  postgres:
    image: postgres:16-alpine
    container_name: skillscope-postgres
    environment:
      POSTGRES_DB: skillscope
      POSTGRES_USER: skillscope
      POSTGRES_PASSWORD: skillscope
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillscope -d skillscope"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: skillscope-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skillscope
      SPRING_DATASOURCE_USERNAME: skillscope
      SPRING_DATASOURCE_PASSWORD: skillscope
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: skillscope-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
